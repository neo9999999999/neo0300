name: 매일 KRX 데이터 캐시 갱신

on:
  schedule:
    # 평일 한국 시간 16:30 (KST = UTC+9 → UTC 07:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update KRX market snapshot
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_USE_MOCK: "false"
        run: |
          python3 daily_update.py
          ls -la cache/

      - name: Refresh enriched parquet (V/S/A/B 추천용)
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_USE_MOCK: "false"
        run: |
          # 기존 enriched 삭제 후 재계산 (단 V/S/A/B에 쓰는 4개만)
          rm -f cache/enriched_default.parquet cache/enriched_box_breakout.parquet
          rm -f cache/enriched_habarocell.parquet cache/enriched_pullback.parquet
          python3 precompute_enriched.py || echo "precompute 실패 (skip)"
          ls -la cache/enriched_*.parquet 2>&1 | head -10

      - name: Build today picks (회피 6+v2 + 오늘의 추천)
        run: |
          python3 live_filter.py || echo "live_filter 실패 (skip)"
          ls -la cache/today_picks* 2>/dev/null

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/market_snapshot.parquet cache/market_snapshot_meta.json \
                  cache/ohlcv_*.pkl cache/enriched_*.parquet \
                  cache/fundamentals_*.parquet cache/supply_demand.parquet \
                  cache/today_picks.csv cache/today_picks.json || true
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "auto: $(date -u +%Y-%m-%d) KRX+펀더+수급+오늘추천 갱신 (GitHub Actions)"
            git push
          fi
